<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Oyunu</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>WordMaster</h1>
            <div class="search-container">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Kelime ara..." autocomplete="off">
                <div class="search-results" id="search-results"></div>
            </div>
        </header>

        <main class="card-container">
            <div class="flashcard" id="flashcard">
                <div class="card-content">
                    <h2 class="word" id="word">Word</h2>
                    <p class="part-of-speech" id="pos">Part of Speech</p>
                    <h3 class="translation" id="translation">Translation</h3>
                    <div class="divider"></div>
                    <p class="sentence" id="sentence">Example sentence</p>
                </div>
            </div>

            <div class="controls">
                <button id="next-btn" class="primary-btn">
                    <span>Sıradaki Kelime</span>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </button>
            </div>

            <div class="progress">
                <span id="progress-text">1 / 10</span>
            </div>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
